const set_css = (k, v) => {
	if (typeof v !== "undefined") {
		return document.documentElement.style.setProperty(k, v);
	} else {
		alert("set_css 出错了");
	}
}
const get_css = (k, v) => {
	if (k.startsWith("--")) {
			return getComputedStyle(document.documentElement).getPropertyValue(k);
	} else if (typeof v !== "undefined") {
			let ele = document.querySelector(k);
			if (ele) {
				return getComputedStyle(ele).getPropertyValue(v);
			} else {
				alert("get_css出错: 无匹配的元素");
			}
	} else {
			alert("get_css出错: 参数不正确");
	}
}

const _LS=(k, v)=>{
	if (typeof v !== "undefined") {
			return localStorage.setItem(k, v);
	} else {
			let t = localStorage.getItem(k);
			if (t === "true") return true;
			else if (t === "false") return false;
			else return t;
	}
}

	var _menuKey, _candidatePanel, _codePanel, _windowWidth;

	function addtool(){
		var addbutton=[];
		var name=["全选","剪切","复制","粘贴","行首","行尾","选行"];
		var tool=[
			"App.action('selectAll')", "App.action('cut')",
			"App.action('copy')", "App.action('paste')",
			"App.key(KEYCODE_HOME)", "App.key(KEYCODE_END)",
			"Render.sel2del(false)"];
		for (var i = 0; i < 7; i++) {
			addbutton.push(`<button ontouchstart="${tool[i]}">${name[i]}</button>`);
		}
		return addbutton.join('');
	}

	function alt2hii(label){
		switch(label){
			case "M": App.key(KEYCODE_MENU);break;
			case "↑": App.key(KEYCODE_UP);break;

	function _escapeHTML(str){
		return str.replace(/[&<>'"]/g,function(tag){
			const kv={
				'&': '&amp;',
	 			'<': '&lt;',
	 			'>': '&gt;',
				"'": '&#39;',
	 			'"': '&quot;'
			};
			return kv[tag] || tag
		});
	}
	
	function _buildKey(label,className, width, dataset, altNote, hii) {
		var altNoteHTML = ''; var hiiHTML='';
		if (altNote) {
			altNoteHTML = `<div class="alt-note">${altNote}</div>`;
			dataset.push(`data-alt="${_escapeHTML(altNote)}"`);
		}
		if (_layout.shifted) {
			label = _layout.upper[label] || label;
		}
		if (hii) {
			hiiHTML = `<div class="hii-note">${hii}</div>`;
			dataset.push(`data-hii="${_escapeHTML(hii)}"`);
		}
		var content = `<div class="keyboard-key ${className}" ${dataset.join(' ')} style="width: ${width}px">`;
		content += `<span class="visual-wrapper"><span>${label}</span>${altNoteHTML}${hiiHTML}</span></div>`;
		return content;
	}

	function adjustScaleLandscape(v,w,h){
		if(w>h)
			return v*(16/9)/(w/h);
		else
			return v*(16/9)/(h/w);
	}

	function draw(){
		var changeScale;
		let content=[];
		if(is_popup){
			document.body.scrollLeft=0;
			if(window.innerWidth)
				_ime.style.maxWidth=window.innerWidth+'px';
			_ime.style.overflowX='auto';
			var screenWidth=Math.min(screen.width,screen.height);
//			App.resize(my.悬浮宽度); //悬浮窗宽度
			changeScale=my.悬浮大小; //悬浮窗字大小
		}else{
			if(landscape){
				changeScale = window.innerWidth / 72;
				changeScale=adjustScaleLandscape(changeScale,screen.width,screen.height);
			}else{
//				changeScale = window.innerWidth / 30;
				let x0=360/640,y0=30,x1=640/360,y1=72;
				let x=screen.width/screen.height;
				let y=(x-x0)/(x1-x0)*(y1-y0)+y0;
				if(y<30) y=30;
				changeScale=window.innerWidth/y;
			}
		}
		document.documentElement.style.fontSize = changeScale + 'px';
		
		var layoutWidth=_layout.width || 10;
		var totalWidth = _ime.clientWidth;
		var 分隔=(my.键盘=="默认" && landscape)?14:10;
		if(my.键盘=="17键2" && landscape) 分隔=14;
		var placeHolderWidth = (landscape?(totalWidth-2)/分隔:(totalWidth-2)/分隔);
		if(!is_popup){
			set_css('--背景色0', 'var(--键盘背景色)');
			content.push("<div class='keyboard-border-inner'></div>");
		}else
			addClass(_ime,'popup');
		content.push("<div class='keyboard-code-panel' style='display:none'></div><div class='keyboard-candidate-panel'></div>");
		if(_layout.key.length>0){
			content.push(`<p class="zg" style="height: .4rem;"></p><div class="adds">${Render.addtool()}</div>`);
			content.push("<div class='keyboard-key-panel'>");
			_layout.key.forEach((function buildKeyboardRow(row, nrow) {
				content.push('<div class="keyboard-row">');
				row.forEach((function buildKeyboardColumns(key, ncolumn) {
					if("h" in key && !landscape) return;
					var keyChar = key.v;
					if(key.c==KEYCODE_STATE) {
						if(document.title.length>0 && _state==0)
							keyChar=document.title.charAt(0);
						else
							keyChar="En";
					}
					if(key.c==KEYCODE_SPACE) {
						if(document.title.length>0 && _state==0){
							if(_layout.alt["l"] && _LS("空格显示")) keyChar=document.title.substr(0,6);
							else _layout.alt[key.v]=document.title.substr(0,6);
						}else{
							if(_layout.alt["l"] && _LS("空格显示")) keyChar="␣";
							else _layout.alt[key.v]="En";
						}
					}
					var code;
					if("c" in key) {
						code=key.c;
					} else {
						code=(keyChar.length==1?keyChar.charCodeAt(0):0);
						if(code>=128) code=0;
					}
					var className = key.sa ? "special-keya" : (key.s ? "special-key" : "");
					if(_layout.shifted && code==KEYCODE_SHIFT)
						if (key.s) className+=" kbr-key-active";
					var ratio = key.r || 1;
					if (landscape) {
						switch(key.v){
								case '中/En':
									if(my.键盘=="17键2")
									 ratio=1;
									else
									 ratio=1.5;
									break;
								case '➥': ratio=1.5; break;
						}
						switch(key.c){
								case KEYCODE_SWITCH_number: ratio=1.5; break;
								case KEYCODE_ENTER: ratio=1.5; break;
						}
					}
					var keyWidth = placeHolderWidth * ratio;
					var dataset = [
						'data-row="'+nrow+'"',
						'data-column="'+ncolumn+'"',
						'data-keycode="'+code+'"'
					];
					if(keyChar=='"') {
						dataset.push(`data-label='"'`);
					} else {
						dataset.push(`data-label="${keyChar}"`);
					}
					if(key.c==KEYCODE_STATE) {
						dataset.push(`data-state="${key.v}"`);
					}
					content.push(
						_buildKey(
							keyChar,
							className,
							keyWidth,
							dataset,
							_layout.alt[key.v],
							_layout.hii[key.v]
						)
					);
				}));
				content.push('</div>');
			}));
			if(my.底部显示==0){
				content.push(`</div><div class="bottom-zg" style="display:inherit"></div>`);
			}else
				content.push(`</div><div class="bottom-zg"><span>${my.footer}</span></div>`);
		}
		_ime.innerHTML = content.join('');
		
		_candidatePanel = $('.keyboard-candidate-panel');
		_codePanel=$('.keyboard-code-panel');
		showCandidates(_cand,_select,_page,_tips,_code);
		_ime.style.setProperty("--keyboard-width",getWidth() +'px');
		_ime.style.setProperty("--keyboard-height",getHeight()+'px');
		
		_windowWidth=totalWidth;
		_screenWidth=screen.width;
		if(_candBar){
			_candidatePanel.style.display="none";
			_codePanel.style.display="none";
		}
		return true;
	}
	
	function unHighlightKey(key){
		var orig=key;
		while(key && key.nodeName=="SPAN")
			key=key.parentElement;
		if(!key) return;
		if(!getDataset(key,"keycode")) {
			setDataset(orig,"active","");
			return;
		}
		if(_hint)
			removeClass(key,'highlighted');
		else
			removeClass(key,'highlighted2');
	}

	function highlightKey(key) {
		var orig = key;
		while (key.nodeName === "SPAN") {
			key = key.parentElement;
		}
		if (!key) return;
		if (!getDataset(key, "keycode")) {
			setDataset(orig, "active", "1");
			return;
		}
		switch(_LS("配色")){
			case "keyboard44.css":
				const animationLayer = document.createElement('div');
				animationLayer.className = 'animation-wrapper';
				key.appendChild(animationLayer);
				
				setTimeout(() => {
					key.removeChild(animationLayer);
					Render.hideAlternatives();
					Render.unHighlightKey(target);
				}, 380);
				break;
			default:
				if(_hint)
					addClass(key,'highlighted');
				else
					addClass(key,'highlighted2');
				break;
		}
	}

	function setShifted(state){
		if(_layout.shifted==state)
			return;
		if(state!='locked')
			_layout.shifted=state;
		var key = $('div[data-keycode="-1"]');
		if(!key) return;
		if (state === 'locked') {
			removeClass(key,'kbr-key-active');
			addClass(key,'kbr-key-hold');
		} else if (state) {
			addClass(key,'kbr-key-active');
			removeClass(key,'kbr-key-hold');
		} else {
			removeClass(key,'kbr-key-active');
			removeClass(key,'kbr-key-hold');
		}
		var keys=document.querySelectorAll('.keyboard-key');
		for (var i = 0; i < keys.length; ++i) {
			key=keys[i];
			var label=getDataset(key,"label");
			if(_layout.shifted) label=_layout.upper[label];
			if(label) {
				key.querySelector("span > span").innerHTML=label;
			}
		}
	}

	const splitdesc = (str) => {
		const match = str.match(/\[(.*?)\]/);
		if (match) {
			return [str.slice(0, match.index), str.slice(match.index)];
		}
	}
	
	function showCandidates(candidates,select,page,tips,code){
		if(!candidates)
			return;
		_candidatePanel.innerHTML = '';
		let candselect;
		if(my.desc && candidates[select] && Array.from(candidates[select]).length==1 && (code && code.code.length>1) && !is_popup){
			candselect=candidates[select];
			if(typeof Check !=="undefined")
				var foundChar = Check.hasOwnProperty(candselect) ? Check[candselect] : undefined;
		}
		showCode(code, foundChar);
		if(candidates.length>0) {
			let cl=["②","③","④"];

			if(my.显单字){  // 选重键显示候选单字
				var cn=(my.键盘=="大空格")?2:1;
				for (var i = 1; i <= 3; i++) {
					if(candidates[i] && candidates[i].length <= cn){
						cl[i-1] = candidates[i];}
				}
			}

			rkey(1,cl);
			var fragment = document.createDocumentFragment();
			var selected;
			candidates.forEach(function buildCandidateEntry(candidate,index) {
				var span = document.createElement('span');
				setDataset(span,"selection",true);
				setDataset(span,"data",select==-1?-1:index);
				let d0=["",""];
				if(!candidate.startsWith('[') && candidate.match(/\[.+\]/)) {
					d0=splitdesc(candidate);
					candidate=d0[0]+`<p class="desc">${d0[1]}</p>`;
				}
				if(_LS("候编号"))
					span.innerHTML = my.编号[index] + candidate;
				else 
					span.innerHTML = candidate;
				if(index==select){
					addClass(span,"first");
					selected=span;
				}
				if (is_popup && _LS("垂直悬浮栏")){
					if(index==select){
						span.classList.add('single-line', 'first');
						selected=span;
					} else
						span.classList.add('single-line');
				}
				if(tips && tips[index]){
					var tipSpan=document.createElement('label');
					addClass(tipSpan,"codetip");
					tipSpan.textContent=tips[index];
					span.appendChild(tipSpan);
				}
				fragment.appendChild(span);
			});
			if(page){
				var pageColor = get_css("--候高亮首选色");
				if(is_popup) pageColor="#fff";
				var svgxml= `<svg class="icon" width="54px" height="37.32px" viewBox="0 0 1756 1024"><path fill="${pageColor}" d="M986.196867 951.596846c-68.60016 68.746429-188.687007 68.746429-257.140898 0L26.525972 145.800937a82.934522 82.934522 0 0 1 0-119.940578 82.788253 82.788253 0 0 1 119.940578 0l651.189579 720.082276a82.788253 82.788253 0 0 0 119.940578 0L1568.786285 25.860359a82.788253 82.788253 0 0 1 119.940579 0 82.934522 82.934522 0 0 1 0 119.940578l-702.529997 805.942178z" /></svg>`;
				var span = document.createElement('span');
				setDataset(span,"selection",true);
				setDataset(span,"page",true);
//				span.textContent = "⇵";
				if(is_popup) span.textContent = "...";
				else span.innerHTML=svgxml;
				fragment.appendChild(span);
				addClass(_candidatePanel,"page");
			}else{
				removeClass(_candidatePanel,"page");
			}
			_candidatePanel.scrollLeft=0;
			_candidatePanel.appendChild(fragment);
			if(selected) selected.scrollIntoView({behavior:'instant'});
			_cand=candidates;
			_page=page;
			_tips=tips;
			_select=select;
		} else {
			candselect="";
			_cand.length=0;
			_select=-1;
			removeClass(_candidatePanel,"page");
			showMenu();
			rkey(false);
			toolbar();
		}

		var label;
		if(_menuKey){
			var label=getDataset(key,"alt");
			return Render.alt2hii(label);
		}
		var keyCode=parseInt(getDataset(key,"keycode"));
		if(Render.isShifted()) {
			label=getDataset(key,"label");
			if(_layout.shifted) label=_layout.upper[label];
			if(label) {
				if(label.length==1){
					keyCode=label.charCodeAt(0);
					if(keyCode>=128)
						keyCode=0;
				}else{
					keyCode=0;
				}
				if(label=="←") keyCode=0x2ff51;
				else if(label=="→") keyCode=0x2ff53;
				else if(label=="⇇") keyCode=0x2ff50;
				else if(label=="⇉") keyCode=0x2ff57;
			}
		}
		return keyCode;
	}

/* handle mouse or touch screen events */
var Handler = (function(){
	var _ime;
	var touchCount = 0;
	var touchPresent = false;
	var touchedKeys = {};
	var touchStart = {};
	var touchChanged = {};
	var deleteTimeout;
	var deleteInterval;
	var menuTimeout;
	var delayTimeout;
	var skipKey=false;
	var flick=false;
	var mark=false;
	var UpperCase=false;
	
	function setCurrentKey(value, touchId) {
		touchedKeys[touchId].target = value;
		touchChanged[touchId]=true;
	}
	
	function setMenuTimeout(target, coords, touchId){
		if (touchCount > 1)
			return;
		if(target.parentElement.nodeName=="SPAN")
			target=target.parentElement;
		var timeout=MENU_TIMEOUT_KEY;
		if(getDataset(target,"selection")=="true")
			timeout=MENU_TIMEOUT_CAND;
		menuTimeout=setTimeout(function(){
			skipKey=true;
			var keycode=Render.getCode(target);
			if((keycode >= 97 && keycode <= 122) && _LS("长按大写") && !mark){
				deleteInterval = setTimeout(function() {
					App.key(keycode - 32);
					UpperCase=true;
				}, 300); return;}
			Render.showAlternatives(target);
			switch(keycode){
					case 0x2ff51:
					case 0x2ff53:
					case KEYCODE_DEL:
						App.key(keycode);
						deleteTimeout=setTimeout(function(){
							App.key(keycode);
							deleteInterval = setInterval(function() {
								App.key(keycode);
							}, REPEAT_RATE);
						},REPEAT_TIMEOUT);
						break;
					case KEYCODE_SPACE:
						deleteInterval = setTimeout(function() {
							App.key(KEYCODE_STATE);
							var temp=(Render.getState()==0) ? "En" : "中文";
							msgbox(temp);
							if(my.键盘==="17键" || my.键盘==="14键") {Render.setKeyboard(Keyboards.english2);}
						}, 300);
						break;
					default:
						if(!keycode && !touchChanged[touchId]){
						var index=getDataset(target,"data");
						let tool=getDataset(target,"tool");
						if(index>=0){
							Render.setSelectIndex(index);
							Render.showMenu([
								{text:'反查',click:"反"},
								{text:'删词',click:"删词"},
								{text:'上移',click:"上移"},
								{text:'下移',click:"下移"},
								{text:'翻译',click:"译"},
							]);
						}else if(getDataset(target,"page")){
							App.page();
						}else if(tool==0){
							overlay("setting",0);
						}else if(tool==1){
							Render.alt2hii("爽");
						}else if(tool==2){
							Render.alt2hii("空");
						}else if(tool==3){
							overlay("mymy",0);
						}else if(tool==4){
							Render.alt2hii("编");
						}else if(tool==5){
							Render.alt2hii("重");
						}else if(tool==8){
							Render.alt2hii("②");
						}else if(tool==10){
							overlay("mymy",2);
						}else if(tool==12){
							overlay("mymy",1);
						}else if(tool==13){
							
						}
					} else skipKey=false;
				}
		},timeout);
	}
	
	function startPress(target, coords, touchId) {
		touchStart[touchId]=Date.now();
		touchChanged[touchId]=false;
		skipKey=false;
		App.feedback();
		setMenuTimeout(target,coords,touchId);
		Render.highlightKey(target);
		UpperCase=false;
	}
	
	function movePress(target, coords, touchId) {
		var oldTarget = touchedKeys[touchId].target;
		if (!target || !oldTarget || oldTarget == target)
			return;
		if(target==oldTarget.parentElement)
			return;
		Render.hideAlternatives();
		Render.highlightKey(target);
		Render.unHighlightKey(oldTarget);
		setCurrentKey(target,touchId);
		
		clearTimeout(deleteTimeout);
		clearInterval(deleteInterval);
		clearTimeout(menuTimeout);
		var keycode=Render.getCode(target);
		if(keycode!=KEYCODE_DEL)
			setMenuTimeout(target,coords,touchId);
	}
	
	function endPress(target, coords, touchId) {
		clearTimeout(deleteTimeout);
		clearInterval(deleteInterval);
		clearTimeout(menuTimeout);
		if (!target) return;
		if(getDataset(target,"selection")) {
			if(!skipKey) {
				if($("#keyboard-overlay")){
					overlay(false);
					Render.unHighlightKey(target);
					return;
				}
				var page=getDataset(target,"page");
				if(page) {
					if(is_popup) App.page();
					else App.cands();
				} else {
					var index=getDataset(target,"data");
					if(index==-1) {
						App.text(target.textContent);
						Render.showCandidates([],0,false);
					}
					else if(!touchChanged[touchId] && !skipKey) {
						App.select(index);
					}
				}
			}
		} else if(getDataset(target,"fanyi")) {
			if(!skipKey){
				var fanyi=getDataset(target,"fanyi");
				App.text(fanyi);
				App.key(27);
				Render.showCandidates([],0,false);}
		} else if(getDataset(target,"tool")) {
			if(!skipKey){
				var tool=getDataset(target,"tool");
				Render.candtool(tool);
			}
		} else if(!skipKey) {
			var keyCode=Render.getCode(target);
			switch(keyCode){
			case 0:
				if(布局!="4") App.text(Render.getText(target));
				break;
			case -104:
				App.text(Render.getText(target));
				App.key(27);
				break;
			case KEYCODE_Select_Index1:
				App.select(1);
				break;
			case KEYCODE_Select_Index2:
				App.select(2);
				break;
			case KEYCODE_Select_Index3:
				App.select(3);
				break;
			case KEYCODE_Select_Index4:
				App.select(4);
				break;
			case KEYCODE_SWITCH_cands:
				App.cands();
				break;
			case KEYCODE_SHIFT:
				if(my.键盘==="符号") var k=true;
				if (Render.isShifted() && my.shift && !k) {
					Render.setShifted('locked');my.shift=false;}
				else if (!Render.isShifted()) {
					Render.setShifted(true);my.shift=true;}
				else {Render.setShifted(false);my.shift=false;}
				break;
			case KEYCODE_SWITCH_number:
				Render.setKeyboard(Keyboards.number);
				break;
			case KEYCODE_SWITCH_number2:
				Render.setKeyboard(Keyboards.number2);
				break;
			case KEYCODE_SWITCH_ENG:
				App.key(KEYCODE_STATE);
				Render.setKeyboard(Keyboards.english2);
				break;
			case KEYCODE_SWITCH_english:
				if(my.双键===1 && Render.getState())
					App.key(KEYCODE_STATE);
				Render.setKeyboard(Keyboards.english);
				if(my.双键>1) {
					App.key(KEYCODE_CTRL_1);
					Render.showToolbar();
					my.双键=1;}
				break;
			default:
				if(keyCode) App.key(keyCode);
				if (my.shift) Render.setShifted(false);
			}
		}
		var diff=Date.now()-touchStart[touchId];
		if(diff>=0 && diff<150)	{
			delayTimeout=setTimeout(function(){
				Render.hideAlternatives();
				Render.unHighlightKey(target);
				delayTimeout=undefined;
			},220-diff);
		} else {
			Render.hideAlternatives();
			Render.unHighlightKey(target);
		}
	}
	
	function handleTouches(evt, callback) {
		for (var i = 0; i < evt.changedTouches.length; i++) {
			var touch = evt.changedTouches[i];
			var touchId = touch.identifier;
			callback(touch, touchId);
		}
	}
	
	function onTouchStart(evt){
		touchPresent=true;
		touchCount = evt.touches.length;
		handleTouches(evt, function handleTouchStart(touch, touchId) {
			 var target = touch.target;
			 target.addEventListener('touchmove', onTouchMove);
			 target.addEventListener('touchend', onTouchEnd);
			 target.addEventListener('touchcancel', onTouchEnd);
			 touchedKeys[touchId] = { target: target, x: touch.pageX, y: touch.pageY };
			 startPress(target, touch, touchId);
		});
	}

	function onTouchMove(evt) {
	    if (UpperCase) return;
	
	    const SWIPE_THRESHOLD = 20;
	    const MOVE_THRESHOLD = 5;
	    const FLICK_THRESHOLD = 70;
	    const HORIZONTAL_STEP = 200; //左右光标移动灵敏度
	    const VALID_SWIPE_KEYS = new Set([8, 32, 34, 41, 109, 112, 118]);
	
	    const handleTouchMove = (touch, touchId) => {
	        const currentTouch = touchedKeys[touchId];
	        const deltaX = Math.abs(currentTouch.x - touch.pageX);
	        const deltaY = Math.abs(currentTouch.y - touch.pageY);
	
	        if (deltaX <= MOVE_THRESHOLD && deltaY <= MOVE_THRESHOLD) return;
					skipKey=true;
	
	        const isSignificantMove = deltaX >= SWIPE_THRESHOLD || deltaY >= SWIPE_THRESHOLD;
	        const keyCode = parseInt(getDataset(touch.target, "keycode"));
	        
	        if (keyCode && isSignificantMove) {
	            const verticalThreshold = landscape ? 35 : my.上下滑动;
	            mark = true;
	
	            if (deltaX <= FLICK_THRESHOLD && deltaY >= verticalThreshold) {
	                flick = currentTouch.y > touch.pageY ? 'up' : 'down';
	            } else if (deltaX >= FLICK_THRESHOLD && deltaY <= verticalThreshold) {
	                handleHorizontalSwipe(currentTouch, touch, keyCode, deltaX);
	            }
	        } else {
	            updateTouchPosition(touchId, touch);
	            movePress(document.elementFromPoint(touch.pageX, touch.pageY), touch, touchId);
	        }
	    };
	
	    const handleHorizontalSwipe = (startTouch, currentTouch, keyCode, deltaX) => {
	        const times = Math.floor(deltaX / HORIZONTAL_STEP);
	        const isValidKey = VALID_SWIPE_KEYS.has(keyCode);
	
	        // 仅在需要多次触发时跳过有效键
	        if (times > 0 && isValidKey) {
	            return;
	        }
	
	        if (times > 0 && deltaX > 5) {
	            const directionKey = startTouch.x > currentTouch.pageX ? KEYCODE_LEFT : KEYCODE_RIGHT;
	            Array.from({ length: times }).forEach(() => App.key(directionKey));
	        } else {
	            flick = startTouch.x > currentTouch.pageX ? 'left' : 'right';
	        }
	    };
	
	    // 保持其他工具函数不变
	    const updateTouchPosition = (touchId, touch) => {
	        touchChanged[touchId] = true;
	        Object.assign(touchedKeys[touchId], {
	            x: touch.pageX,
	            y: touch.pageY
	        });
	    };
	
	    handleTouches(evt, handleTouchMove);
	}
	
	function onTouchEnd(evt){
		touchCount = evt.touches.length;

		handleTouches(evt, function handleTouchEnd(touch, touchId) {		
			if (!touchedKeys[touchId])
				return;
			var target = touch.target;
			target.removeEventListener('touchmove', onTouchMove);
			target.removeEventListener('touchend', onTouchEnd);
			target.removeEventListener('touchcancel', onTouchEnd);
			if (flick) {
				flickkey(target);
			}
			flick = false;
			endPress(touchedKeys[touchId].target, touch, touchId);
			delete touchedKeys[touchId];
			mark=false;
		});
	}

	function flickkey(target){
		skipKey=true;
		var key=getDataset(target,"keycode");
		switch(flick){
			case 'left':
				if(key==KEYCODE_DEL) Render.sel2del(2);
				else if(key==118){
					App.key(KEYCODE_HOME);
				}
				else if(key==112){
					Render.setKeyboard(Keyboards.number2);
				}
				else if(key==34 && my.键盘=="数字"){
					Render.setKeyboard(Keyboards.english);
//					Render.setKeyboard(Keyboards.number);
				}
				else if(key==41 && my.键盘=="符号"){
					if(Render.getState())App.key(KEYCODE_STATE);
					Render.setKeyboard(Keyboards.english);
				}
				else if(key==KEYCODE_SPACE) App.key(KEYCODE_UP);
				else App.key(KEYCODE_LEFT);
				break;
			case 'right':
				if(key==109) Render.sel2del(3);
				else if(key==118){
					App.key(KEYCODE_END);
				}
				else if(key==KEYCODE_SPACE) App.key(KEYCODE_DOWN);
				else App.key(KEYCODE_RIGHT);
				break;
			case 'up':
				if (key==KEYCODE_SPACE){
					Render.alt2hii("★");
//					App.key(KEYCODE_STATE);
				} else {
					if (_LS("上滑大写")){
						if (key >= 97 && key <= 122){
							App.key(key-32);return;}
					}
					var label=getDataset(target,"alt");
					if (!label) return;
					var keycode=Render.alt2hii(label);
					if (keycode) App.key(keycode);
					else if(keycode==0 && 布局!="4") App.text(label);
				}
				break;
			case 'down':
				if(key==KEYCODE_DEL) App.key(KEYCODE_ESC);
				else{
					var label=getDataset(target,"hii");
					if (!label) return;
					var keycode=Render.alt2hii(label);
					if (keycode) App.key(keycode);
					else if(keycode==0 && 布局!="4") App.text(label);
				}
				break;
		}
	}
	
	function onMouseDown(evt){
		evt.preventDefault();
		if(touchPresent)
			return;
		if(evt.button!=0)
			return;
		scroll=true;
		evt.preventDefault();
		touchedKeys[0] = { target: evt.target, x: 0, y: 0 };
		startPress(evt.target, evt, 0);
	}
	
	function onMouseUp(evt){
		if(touchPresent)
			return;
		endPress(evt.target, evt, 0);
		touchedKeys[0]=undefined;
	}
	
	function onMouseMove(evt){
		if(touchPresent)
			return;
		if(!touchedKeys[0])
			return;
		movePress(evt.target, evt, 0);
	}
	
	function onContextMenu(event){
		event.preventDefault();
	}
	
	var eventHandlers = {
		touchstart: onTouchStart,
		mousedown: onMouseDown,
		mouseup: onMouseUp,
		mousemove: onMouseMove,
		contextmenu: onContextMenu
	};
	
	function init(keyboard){
		_ime=$(keyboard);
		for (var event in eventHandlers)
			_ime.addEventListener(event, eventHandlers[event]);
	}
	
	function click(div,end,start){
		var _get_pos=function(e){
			var x,y;
			if(e.touches && e.touches.length){
				x=e.touches[0].pageX;
				y=e.touches[0].pageY;
			}else if(e.changedTouches && e.changedTouches.length){
				x=e.changedTouches[0].pageX;
				y=e.changedTouches[0].pageY;
			}else{
				x=e.pageX;
				y=e.pageY;
			}
			if(x===undefined)
				return null;
			return [x,y];
		};
		var _distance=function(a,b){
			if(!a || !b)
				return 0;
			return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2));
		};
		var _longpress_tmr=undefined;
		var _start=function(e){
			if(self!=top)
				e.preventDefault();
			if(e.target.tagName!='BUTTON')
				return;
			var ele=e.target;
			if(div.scrollHeight>div.clientHeight){
				var prev=div.scrollTop;
				setTimeout(function(){
					if(div.ontouchend && prev==div.scrollTop){
						addClass(ele,"active");
						App.feedback();
					}
				},100);
			}else{
				addClass(ele,"active");
				App.feedback();
			}
			
			var pos=_get_pos(e);
			
			var _end=function(e){
				if(_longpress_tmr){
					clearTimeout(_longpress_tmr);
					_longpress_tmr=undefined;
				}
				if(self!=top)
					e.preventDefault();
				removeClass(ele,"active");
				if(div.ontouchend)
					div.ontouchend=null;
				if(div.ontouchcancel)
					div.ontouchcancel=null;
				if(div.onmouseup)
					div.onmouseup=null;
				if(ele.classList.contains('longpress')){
					removeClass(ele,'longpress');
					return;
				}
				if(end && (start || _distance(_get_pos(e),pos)<5))
					end(e);
			};
			if(div.ontouchstart){
				div.ontouchend=_end;
				div.ontouchcancel=_end;
			}
			if(div.onmousedown)
				div.onmouseup=_end;
			if(start)
				start(e);

			if(getDataset(ele,'longpress')){
				_longpress_tmr=setTimeout(()=>{
					_longpress_tmr=undefined;
					if(!end({type:'longpress',target:ele,}))
						return;
					addClass(ele,"longpress");
					removeClass(ele,"active");
				},REPEAT_TIMEOUT);
			}
		};
		if(div.ontouchstart!==undefined)
			div.ontouchstart=_start;
		else if(div.onmousedown!==undefined)
			div.onmousedown=_start;
	}
	
	return {
		init,
		click
	};
})();

			App.key(YK_VIRT_QUERY);

		}

function setupTouchListeners(div, type, on) {
	var touch, touch1, index, txt, tt = false, regeX = /(https?:\/\/[^\s]+)/g,xx,cp;
	if(localStorage.clipboard)
		txt=JSON.parse(localStorage.clipboard);
	div.addEventListener("touchstart", function (e) {
		touch = e.changedTouches.item(0);
		var actionTimeout, ele=e.target;
		if(ele.tagName === 'BUTTON') {
			ele.classList.add('touch-highlight');
		}
		if(type=="clipboard" || type=="phrase") cp=true;
		if(ele.tagName=='BUTTON' && cp){
				index=getDataset(ele,"index");
				actionTimeout=setTimeout(function(){
					my.clipindex=index;
					var Menu=[
						{text:"置顶",click:"⏍1"},
						{text:"删除",click:"⏍3"},
					];
					var Menu1=[
						{text:"访问url",click:"⏍4"},
						{text:"输出url",click:"⏍5"}
					];
					var Menu3=[
						{text:"分享到剪贴板",click:"⏍6"}
					];
					var urls=txt[index].text.match(regeX);
					my.urls=urls;
				  if(urls) Menu=Menu.concat(Menu1);
					if(type=="clipboard")
						Render.showMenu(Menu);
					else{
						Render.showMenu(Menu3);
					}
				},700);}
			var handleMove = function() {
				// 滑动时仅清除定时器，不移除高亮
				if(actionTimeout){
					clearTimeout(actionTimeout);
					actionTimeout=undefined;
				}
				ele.removeEventListener('touchmove', handleMove);
			};
			var handleEnd = function() {
				if(ele.tagName === 'BUTTON') {
					ele.classList.remove('touch-highlight');
				}
				if(actionTimeout){
					clearTimeout(actionTimeout);
					actionTimeout=undefined;
				}
				ele.removeEventListener('touchend', handleEnd);
				ele.removeEventListener('touchmove', handleMove);
			};
			ele.addEventListener('touchend', handleEnd);
			ele.addEventListener('touchmove', handleMove);
	});
	div.addEventListener("touchend", function (e) {
		touch1 = e.changedTouches.item(0);
		if(type=="jsload") xx=600; else xx=400;
		if (touch1.clientX - touch.clientX > xx && !tt) {
			if(type=="cands") App.key(27);
			overlay(type, false);
			toolbar();
			tt = true;
		}
	});
	if(on==1) return;
	div.addEventListener("click", function (e) {
		var ele = e.target;
		if(ele.tagName === 'BUTTON') {
			ele.classList.add('touch-highlight');
			setTimeout(() => ele.classList.remove('touch-highlight'), 200);
		}
		var text = e.target.textContent;
		index=getDataset(e.target,"index");
		if(e.target.tagName!='BUTTON' && !index) return;
		if (!text) return;
		switch(type){
			case "jslist": 
				var N=jsname[Object.keys(jsname)[index]];
				overlay();overlay('jsload',1,N);return;
				break;
			case "theme":theme(index);break;
			case "cands":App.select(index, true);break;
			case "phrase":
				let txt0= my.phrase[index];
				App.text(txt0);
				break;
			case "clipboard":
				App.text(txt[index].text);
				if(index>my.剪置顶)
					App.onClipChanged(txt[index].text);
				break;
			case "mymy":
				App.text(text);
				break;
			case "emoji":
				App.text(text);
				if(!_LS("锁")){
					toolbar();
				}else return;
				break;
		}
		setTimeout(overlay,100);
	});
}

function updateClipboardDisplay(div){
	div.innerHTML='';
	var arr=[];
	try{
		arr=JSON.parse(localStorage.clipboard);
	}catch(e){
	}

	if(!Array.isArray(arr) || arr.length==0){
		var p=document.createElement('p');
		p.textContent='当前没有内容';
		div.appendChild(p);
		return;
	}
	for(var i=0;i<arr.length;i++){
		var p=arr[i];
		var d=new Date(p.time);
		var h=d.getHours().toString().padStart(2,0);
		var m=d.getMinutes().toString().padStart(2,0);
		var s=d.getSeconds().toString().padStart(2,0);
		var time=`${h}:${m}:${s}`;
		var one = document.createElement('button');
		var span = document.createElement('span');
//		span.textContent = time;
		span.textContent = arr.length-i;
		one.appendChild(span);
		var textNode = document.createTextNode(p.text.substr(0,50)); 
		one.appendChild(textNode);
		one.dataset.index=i;
		div.appendChild(one);
	}
}

/*读取yong.ini配置文件*/
async function iniGet(G,K){
	var text,config=null;
	try{
		text=await (await fetch("https://yong.dgod.net/config/yong.ini")).text();
		if(!text)
			return null;
	}catch(e){
		console.log(e);
		text='';
	}
	var arr=text.split('\n').map(e=>e.trim());
	var config={};
	var cur=null;
	for(var i=0;i<arr.length;i++){
		var line=arr[i];
		if(!line || line[0]=='#')
			continue;
		if(line[0]=='['){
			var grp=line.substring(1,line.length-1);
			if(!config[grp])
				config[grp]={};
			cur=config[grp];
			continue;
		}
		if(!cur)
			continue;
		var j=line.indexOf('=');
		if(j<=0)
			continue;
		var key=line.substring(0,j).trim();
		var val=line.substring(j+1).trim();
		cur[key]=val;
	}
	return config[G][K];
}

// 简易Markdown转HTML函数
function markDown() {
	var markdown = _LS("message") + "\n˜˜__ᴇɴᴅ__˜˜";
	if (markdown === null) {
		msgbox('没有内容'); overlay(); return;
	}
	const EscapeHtml=(str)=>{
		return str.replace(/`/g, "&#96;");
	}
	const replacements = [
		{ pattern: /</g, replacer: "&lt;" },
		{ pattern: /```.*\n([\s\S]*?)```/g, 
			replacer: (_, code) => `<pre onclick="App.text(this.textContent); event.stopPropagation();">${EscapeHtml(code)}</pre>` },
		{ pattern: /`(.*?)`/g, replacer: `<span class="col-3">$1</span>` },
		{ pattern: /^#{2,5}\s?(.*)/gm, replacer: '<span class="col-4">$1</span>' },
		{ pattern: /˜˜([\s\S]*?)˜˜/gm, replacer: '<span class="col-5">$1</span>' },
		{ pattern: /℗(.*?)℗/g, replacer: '<img src="./帮助/pic/$1" alt="$1">' },
		{ 
			pattern: /⁽\n([\s\S]*?)\n⁾/g, 
			replacer: (_, tableContent) => {
				return `<table><tr>${tableContent.split('\n').reduce((acc, row, index) => {
					const cells = row.split('|');
					return acc + (index === 0 ? 
						cells.map(cell => `<th>${cell.replace(/\\n/g, '<br')}</th>`).join('') :
						`</tr><tr>${cells.map(cell => `<td>${cell.replace(/\\n/g, '<br>')}</td>`).join('')}`
					);
				}, '')}</tr></table>`;
			}
		},
		{ pattern: /\*\*(.*?)\*\*/g, replacer: '<span class="col-2">$1</span>' },
		{ pattern: /\]\((https?:\/\/[^)]+)\)/g, replacer: ']<pre class="col-6" onclick="App.commit(`$GO(${this.textContent})`); event.stopPropagation();">$1</pre>' },
		{ pattern: /^---$/gm, replacer: '<hr>' },
		{ pattern: /^(\d+)\. (.*?)/gm, replacer: '<span class="col-8">$1.</span> $2' },
		{ 
			pattern: /⁺\n⁻(.*?)\⁻\n([\s\S]*?)\n⁺/g, 
			replacer: (_, title, content) => `<details><p class='p1'><summary>${title}</summary>${content}</p></details>`
		}
	];
	replacements.forEach(({ pattern, replacer }) => {
		markdown = markdown.replace(pattern, replacer);
	});
	return markdown;
}

async function openAI(callback) {
	const data = {
		"model": my.Model,
		"messages": [
			{ role: "system", content: my.助手 },
			{ role: "user", content: my.Text }
		],
		"stream": true,
		"temperature": 0.3
	};
	var URL = `https://${my.url}chat/completions`;
	try {
		const response = await fetch(URL, {
				method: 'POST',
				headers: {
						'Content-Type': 'application/json',
						'Authorization': "Bearer " + my.ApiKey,
				},
				body: JSON.stringify(data)
		});
			if (!response.ok) {
				throw new Error(`HTTP error! status: ${response.status}`);
			}
			const reader = response.body.getReader();
			const decoder = new TextDecoder();
			let buffer = '';
			while (true) {
				const { done, value } = await reader.read();
				if (done) {
					if (buffer) {
							try {
								const json = JSON.parse(buffer.substring(6));
								console.log("last buffer" + buffer)
							} catch (e) {
								console.error("Error parsing last buffer:", e, buffer);
						}
					}
					break;
				}
					buffer += decoder.decode(value);
					while (buffer.includes('\n')) {
						const newlineIndex = buffer.indexOf('\n');
						const line = buffer.substring(0, newlineIndex).trim();
						buffer = buffer.substring(newlineIndex + 1);
						if (line.startsWith('data:')) {
								const data = line.substring(5).trim();
								if (data === '[DONE]') {
									msgbox('输出完成',1000);
									overlay('msgbox',0);
									return;
								}
								try {
									const json = JSON.parse(data);
									const co1=json.choices[0]?.delta?.content;
									const co2=json.choices[0]?.delta?.reasoning_content;
									var content = co2 || co1 || "";
									if(co2 && !my.think){
										my.think=true;
										content="⁺\n⁻思考过程:⁻\n˜˜"+content;
									}else if(co1 && my.think){
										my.think=false;
										content="˜˜\n⁺"+content;
									}
									if (content) {
											//console.log("content:" + content)
											callback(content); // 调用回调函数
									}
								} catch (e) {
									console.error("Error parsing JSON:", e, data);
								}
						}
				}
		}
	} catch (error) {
		console.error("Fetch error:", error);
	}
}

// 双拼(4编码)模糊音转换
function fuzzyReplace(code) {
	const chars = code.split('');  // 转换为字符数组
	// 定义模糊音替换映射（互换规则）
	const replacementMap = {
			's': 'u', 'u': 's',
			'z': 'v', 'v': 'z',
			'c': 'i', 'i': 'c',
			'l': 'n', 'n': 'l'
	};
	// 转换单数索引(1 3 5 ...)
	for (let i = 0; i < chars.length; i += 2) {
		if (replacementMap[chars[i]]) {
			chars[i] = replacementMap[chars[i]];
		}
	}
	return chars.join(''); // 重新组合为字符串并返回
}
