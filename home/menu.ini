[root]
child=output im ooxx ooml help oofk update tools

[output]
name=⚠️TSF 模式未生效，改用外挂输出模式：
exec=$OUTPUT

[im]
name=方案切换（Ctrl+Shift+H）
exec=$IMLIST

[ooxx]
name=小小输入法程序（ooxx）
child=config reload yong exit
[config]
name=配置小小（yong-config）
exec=$CONFIG
#$CONFIG会自动根据当前界面程序的位数判断调用哪一个
[reload]
name=重载小小
exec=$RELOAD
[yong]
name=重启小小（Win）
exec=$GO($(_HOME)/tools/yong.bat)
[exit]
name=退出小小
exec=$EXIT

[ooml]
name=目录（ooml）
child=datadir homedir mbdir
[datadir]
name=程序目录（Win）
exec=$GO($(_DATA))
[homedir]
name=配置目录（Win）
exec=$GO($(_HOME))
[mbdir]
name=本地码表（Win）
exec=$GO($(_HOME)/mb)

[help]
name=帮助（oogw · oorm）
child=gw1 gw2 gw3 - rm - about
[gw1]
name=小小星空首页 · 在线帮助文档
exec=$GO(https://xkinput.github.io/xxxk-help)
[gw2]
name=小小星空网盘
exec=$GO(https://xxxk.ysepan.com/)
[gw3]
name=星空系列方案首页
exec=$GO(https://xkinput.github.io/)
[rm]
name=本地帮助文档（Win）
exec=$GO($(_HOME)/doc)
[about]
name=关于小小星空
exec=$MSG(v2.1.1.0-Build20260628)

[oofk]
name=反馈码表修改建议
child=jdfk jdfk2 ydfk
[jdfk]
name=反馈码表修改建议（键道）
exec=$GO(https://keytao.vercel.app)
[jdfk2]
name=反馈码表修改建议（键道，备用）
exec=$GO(https://keytao.rea.ink)

[update]
name=检查更新
child=jdup yongup
[jdup]
name=主程序（稳定版）和键道词库（测试版）
exec=$GO($(_HOME)/tools/windikt.exe)
[yongup]
name=主程序（测试版）
exec=$GO(yong-config --update)

[tools]
name=其他工具
child=stat keymap #xchr
[stat]
name=输入统计
exec=$STAT
[keymap]
name=键盘图
exec=$KEYMAP
[xchr]
name=符文角
exec=$GO($(_HOME)/tools/xchr/xchr.exe)
